<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 BP Book Checklist</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#12121e;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column}

.header{background:#1a1a2e;border-bottom:1px solid #2a2a4e;padding:10px 16px;display:flex;align-items:center;gap:10px}
.header h1{font-size:17px;color:#e0a800;flex:1}
.btn-danger-sm{background:#2a2a4e;border:1px solid #6a2a2a;color:#ff6b6b;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px}
.btn-danger-sm:hover{background:#4a1a1a}
.btn-info-sm{background:#2a2a4e;border:1px solid #3a3a6e;color:#4a90d9;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px}
.btn-info-sm:hover{background:#1a2a3e;border-color:#4a90d9}
.info-link{display:inline-block;background:#4a90d9;color:#fff;border:none;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:bold;text-decoration:none;margin-bottom:14px}
.info-link:hover{background:#3a80c9}
.info-note{font-size:13px;color:#aaa;line-height:1.7;background:#12121e;border:1px solid #2a2a4e;border-radius:8px;padding:12px 14px}

.main{flex:1;padding:14px 16px;display:flex;flex-direction:column;gap:10px;max-width:1400px;width:100%;margin:0 auto}

.top-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.book-search-wrap{position:relative;min-width:220px;flex:1;max-width:400px}
.book-search-wrap input{width:100%;background:#1e1e32;color:#e0e0e0;border:1px solid #3a3a6e;border-radius:8px;padding:9px 14px;font-size:14px;outline:none}
.book-search-wrap input:focus{border-color:#4a90d9}
.search-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#1a1a2e;border:1px solid #3a3a6e;border-radius:8px;max-height:240px;overflow-y:auto;z-index:50;display:none}
.search-dropdown.open{display:block}
.search-item{padding:8px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid #2a2a4e}
.search-item:last-child{border-bottom:none}
.search-item:hover{background:#252540}
.search-item .s-ko{color:#e0e0e0}
.search-item .s-en{color:#666;font-size:11px;margin-top:2px}
.search-item .s-cat{color:#4a90d9;font-size:10px}
.search-highlight{color:#4a90d9;font-weight:bold}

.book-stats{font-size:12px;color:#666;display:flex;gap:14px;flex-wrap:wrap}
.book-stats span{color:#aaa}
.stat-done{color:#4CAF50!important}
.stat-partial{color:#e0a800!important}

.book-filter{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.filter-btn{background:#2a2a4e;border:1px solid #3a3a6e;color:#aaa;padding:5px 12px;border-radius:20px;cursor:pointer;font-size:12px}
.filter-btn:hover{border-color:#4a90d9;color:#fff}
.filter-btn.active{background:#4a90d9;color:#fff;border-color:#4a90d9}
.filter-sep{color:#3a3a6e}
.filter-collected{background:#2a2a4e;border:1px solid #3a3a6e;color:#aaa;padding:5px 12px;border-radius:20px;cursor:pointer;font-size:12px}
.filter-collected:hover{border-color:#e0a800;color:#fff}
.filter-collected.active{background:#e0a800;color:#12121e;border-color:#e0a800;font-weight:bold}

.book-grid{flex:1;display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:8px;align-content:start}
.book-card{background:#1e1e32;border:1px solid #2a2a4e;border-radius:8px;padding:10px 12px;cursor:pointer;transition:border-color .15s;display:flex;flex-direction:column;gap:4px}
.book-card:hover{border-color:#4a90d9}
.book-card.done{border-color:#2a5a2a;background:#1a2a1a}
.book-card.done:hover{border-color:#4CAF50}
.book-card.partial{border-color:#5a4a1a;background:#2a2510}
.book-card.partial:hover{border-color:#e0a800}
.book-card.has-subtitles{cursor:default}
.book-card.has-subtitles:hover{border-color:#2a2a4e}
.book-card.has-subtitles.done:hover{border-color:#2a5a2a}
.book-card.has-subtitles.partial:hover{border-color:#5a4a1a}
.book-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.book-ko{font-size:13px;font-weight:bold;color:#e0e0e0;line-height:1.4;flex:1}
.book-en{font-size:11px;color:#666;line-height:1.3}
.book-card-bottom{display:flex;justify-content:space-between;align-items:center}
.book-cat{font-size:10px;color:#4a90d9}
.book-progress{font-size:12px;font-weight:bold}
.book-progress.done{color:#4CAF50}
.book-progress.partial{color:#e0a800}
.book-progress.none{color:#555}
.book-check{width:20px;height:20px;border-radius:50%;border:2px solid #3a3a6e;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.book-check.done{background:#4CAF50;border-color:#4CAF50;color:#fff}
.book-subtitles{display:flex;flex-direction:column;gap:2px;margin-top:8px;padding-top:8px;border-top:1px solid #2a2a4e}
.subtitle-item{display:flex;align-items:center;gap:7px;cursor:pointer;padding:3px 4px;border-radius:4px}
.subtitle-item:hover{background:rgba(255,255,255,0.05)}
.subtitle-check{width:14px;height:14px;border-radius:3px;border:1.5px solid #3a3a6e;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
.subtitle-check.done{background:#4CAF50;border-color:#4CAF50;color:#fff}
.subtitle-label{font-size:11px;color:#999;line-height:1.3}
.subtitle-item.done .subtitle-label{color:#4CAF50;text-decoration:line-through;opacity:.7}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:#1a1a2e;border:1px solid #3a3a6e;border-radius:12px;padding:24px;min-width:300px;max-width:460px;width:90%}
.modal h2{color:#ff6b6b;font-size:16px;margin-bottom:12px}
.modal p{font-size:13px;color:#aaa;line-height:1.6;margin-bottom:4px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.btn-primary{background:#e0a800;color:#12121e;border:none;padding:8px 20px;border-radius:6px;font-size:13px;font-weight:bold;cursor:pointer}
.btn-secondary{background:#2a2a4e;color:#aaa;border:1px solid #3a3a6e;padding:8px 20px;border-radius:6px;font-size:13px;cursor:pointer}
.btn-danger{background:#4a1a1a;color:#ff6b6b;border:1px solid #6a2a2a;padding:8px 20px;border-radius:6px;font-size:13px;cursor:pointer;font-weight:bold}
.btn-danger:hover{background:#6a1a1a}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#4CAF50;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:bold;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}

.empty-msg{color:#555;padding:20px;text-align:center}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#12121e}
::-webkit-scrollbar-thumb{background:#3a3a6e;border-radius:2px}
</style>
</head>
<body>

<div class="header">
  <h1>📚 BP Book Checklist</h1>
  <button class="btn-info-sm" onclick="openInfoModal()">📍 책 위치정보</button>
  <button class="btn-danger-sm" onclick="openResetModal()">🗑️ 초기화</button>
</div>

<div class="main">
  <div class="top-row">
    <div class="book-search-wrap">
      <input type="text" id="bookSearch" placeholder="책 이름 검색 (한국어 or 영어)..."
        oninput="onBookSearch(this.value)" onblur="setTimeout(()=>closeDropdown(),150)">
      <div class="search-dropdown" id="searchDropdown"></div>
    </div>
    <div class="book-stats" id="bookStats"></div>
  </div>
  <div class="book-filter">
    <button class="filter-btn active" onclick="setFilter('all',this)">전체</button>
    <button class="filter-btn" onclick="setFilter('Books &amp; Manuals',this)">📖 Books</button>
    <button class="filter-btn" onclick="setFilter('Letters &amp; Records',this)">✉️ Letters</button>
    <button class="filter-btn" onclick="setFilter('Notices &amp; Posters',this)">📄 Notices</button>
    <button class="filter-btn" onclick="setFilter('Other Readables',this)">📜 Other</button>
    <span class="filter-sep">|</span>
    <button class="filter-collected" id="filterCollected" onclick="toggleCollectedFilter(this)">🔲 미수집만 보기</button>
  </div>
  <div class="book-grid" id="bookGrid"></div>
</div>

<div class="modal-overlay" id="modalReset">
  <div class="modal">
    <h2>⚠️ 전체 초기화</h2>
    <p>모든 수집 기록이 삭제됩니다.</p>
    <p style="color:#ff6b6b;font-size:12px;margin-top:6px">이 작업은 되돌릴 수 없습니다.</p>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeResetModal()">취소</button>
      <button class="btn-danger" onclick="confirmReset()">초기화</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalInfo">
  <div class="modal">
    <h2 style="color:#4a90d9">📍 책 위치정보</h2>
    <a class="info-link" href="https://starresonance.th.gl/" target="_blank" rel="noopener">🔗 Star Resonance 위키 바로가기</a>
    <div class="info-note">
      인게임 책 획득 위치는 위키를 참고하세요.<br>
      <br>
      📌 <strong style="color:#e0e0e0">수집 설정 방법</strong><br>
      Documents 카테고리 이외의 책들은<br>
      모두 <strong style="color:#e0a800">None</strong>으로 변경하세요.
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeInfoModal()">닫기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// progress: {id(string): 1 | 0 | string[]}
let progress = {};
let bookData = [];
let currentCatFilter = 'all';
let showOnlyUncollected = false;
let searchFiltered = null;

// ===================== Storage =====================
function loadProgress() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

function saveProgress() {
  localStorage.setItem(LS_KEY, JSON.stringify(progress));
}

// ===================== Book data =====================
function buildBookData() {
  bookData = MASTER.map(m => {
    const val = progress[String(m.id)];
    let collected, collected_subtitles;
    if (Array.isArray(val)) {
      collected_subtitles = val;
      collected = val.length;
    } else {
      collected = val === 1 ? m.total : 0;
      collected_subtitles = [];
    }
    return { ...m, collected, collected_subtitles };
  });
}

// ===================== Render =====================
function renderBookStats() {
  const total = bookData.length;
  const done = bookData.filter(b => {
    const hasSubs = b.subtitles && b.subtitles.length > 0;
    return hasSubs ? b.collected_subtitles.length >= b.subtitles.length : b.collected >= b.total;
  }).length;
  const partial = bookData.filter(b => {
    const hasSubs = b.subtitles && b.subtitles.length > 0;
    const col = hasSubs ? b.collected_subtitles.length : b.collected;
    const tot = hasSubs ? b.subtitles.length : b.total;
    return col > 0 && col < tot;
  }).length;
  const none = total - done - partial;
  document.getElementById('bookStats').innerHTML =
    `총 <span>${total}</span>개 &nbsp;` +
    `<span class="stat-done">완료 ${done}</span> &nbsp;` +
    `<span class="stat-partial">진행중 ${partial}</span> &nbsp;` +
    `미수집 <span>${none}</span>`;
}

function setFilter(cat, btn) {
  currentCatFilter = cat;
  document.querySelectorAll('.book-filter .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  searchFiltered = null;
  document.getElementById('bookSearch').value = '';
  closeDropdown();
  renderBookGrid();
}

function toggleCollectedFilter(btn) {
  showOnlyUncollected = !showOnlyUncollected;
  btn.classList.toggle('active', showOnlyUncollected);
  renderBookGrid();
}

function renderBookGrid(filtered) {
  const grid = document.getElementById('bookGrid');
  let list = filtered !== undefined ? filtered : bookData;
  if (currentCatFilter !== 'all') list = list.filter(b => b.category === currentCatFilter);
  if (showOnlyUncollected) list = list.filter(b => {
    const hasSubs = b.subtitles && b.subtitles.length > 0;
    return hasSubs ? b.collected_subtitles.length === 0 : b.collected === 0;
  });
  if (!list.length) { grid.innerHTML = '<div class="empty-msg">항목 없음</div>'; return; }

  grid.innerHTML = list.map(b => {
    const hasSubs = b.subtitles && b.subtitles.length > 0;
    const cs = b.collected_subtitles || [];
    const isDone = hasSubs ? cs.length >= b.subtitles.length : b.collected >= b.total;
    const isPartial = hasSubs
      ? cs.length > 0 && cs.length < b.subtitles.length
      : b.collected > 0 && b.collected < b.total;
    const cardClass = (isDone ? 'done' : isPartial ? 'partial' : '') + (hasSubs ? ' has-subtitles' : '');
    const progClass = isDone ? 'done' : isPartial ? 'partial' : 'none';
    const catLabel = {'Books & Manuals':'📖 Books','Letters & Records':'✉️ Letters','Notices & Posters':'📄 Notices','Other Readables':'📜 Other'}[b.category] || b.category;
    const col = hasSubs ? cs.length : b.collected;
    const tot = hasSubs ? b.subtitles.length : b.total;
    const checkHtml = !hasSubs
      ? `<div class="book-check ${isDone ? 'done' : ''}">${isDone ? '✓' : ''}</div>`
      : '';
    const clickAttr = !hasSubs ? `onclick="toggleBook(${b.id})"` : '';
    const subsHtml = hasSubs ? `
      <div class="book-subtitles">
        ${b.subtitles.map(s => {
          const checked = cs.includes(s);
          return `<div class="subtitle-item ${checked ? 'done' : ''}" onclick="toggleSub(${b.id},'${esc(s).replace(/'/g,"\'")}')">
            <div class="subtitle-check ${checked ? 'done' : ''}">✓</div>
            <span class="subtitle-label">${esc(s)}</span>
          </div>`;
        }).join('')}
      </div>` : '';

    return `<div class="book-card ${cardClass}" ${clickAttr}>
      <div class="book-card-top">
        <div>
          <div class="book-ko">${esc(b.ko || b.title)}</div>
          <div class="book-en">${esc(b.title)}</div>
        </div>
        ${checkHtml}
      </div>
      <div class="book-card-bottom">
        <span class="book-cat">${catLabel}</span>
        <span class="book-progress ${progClass}">${col}/${tot}</span>
      </div>
      ${subsHtml}
    </div>`;
  }).join('');
}

// ===================== Toggle =====================
function toggleBook(id) {
  const book = bookData.find(b => b.id === id);
  if (!book) return;
  const key = String(id);
  if (book.collected >= book.total) {
    progress[key] = 0;
    book.collected = 0;
  } else {
    progress[key] = 1;
    book.collected = book.total;
  }
  saveProgress();
  renderBookGrid(searchFiltered !== null ? searchFiltered : undefined);
  renderBookStats();
}

function toggleSub(id, subtitle) {
  const book = bookData.find(b => b.id === id);
  if (!book) return;
  const key = String(id);
  if (!book.collected_subtitles) book.collected_subtitles = [];
  const idx = book.collected_subtitles.indexOf(subtitle);
  if (idx >= 0) book.collected_subtitles.splice(idx, 1);
  else book.collected_subtitles.push(subtitle);
  book.collected = book.collected_subtitles.length;
  progress[key] = [...book.collected_subtitles];
  saveProgress();
  renderBookGrid(searchFiltered !== null ? searchFiltered : undefined);
  renderBookStats();
}

  document.getElementById('modalInfo').classList.add('active');
}
function closeInfoModal() {
  document.getElementById('modalInfo').classList.remove('active');
}
document.getElementById('modalInfo').addEventListener('click', e => {

});

function openResetModal() {
  document.getElementById('modalReset').classList.add('active');
}
function closeResetModal() {
  document.getElementById('modalReset').classList.remove('active');
}
function confirmReset() {
  progress = {};
  saveProgress();
  buildBookData();
  renderBookGrid();
  renderBookStats();
  closeResetModal();
  showToast('초기화 완료');
}

document.getElementById('modalReset').addEventListener('click', e => {
  if (e.target === document.getElementById('modalReset')) closeResetModal();
});

// ===================== Search =====================
function onBookSearch(val) {
  const q = val.trim().toLowerCase();
  const dd = document.getElementById('searchDropdown');
  if (!q) { dd.classList.remove('open'); searchFiltered = null; renderBookGrid(); return; }
  const results = bookData.filter(b =>
    (b.ko && b.ko.toLowerCase().includes(q)) || b.title.toLowerCase().includes(q)
  ).slice(0, 20);
  if (!results.length) { dd.classList.remove('open'); searchFiltered = []; renderBookGrid([]); return; }
  dd.innerHTML = results.map(b => {
    const koHL = b.ko ? highlight(b.ko, q) : '';
    const enHL = highlight(b.title, q);
    const catIcon = {'Books & Manuals':'📖','Letters & Records':'✉️','Notices & Posters':'📄','Other Readables':'📜'}[b.category] || '';
    return `<div class="search-item" onmousedown="selectSearch(${b.id})">
      <div class="s-ko">${koHL || enHL}</div>
      <div class="s-en">${koHL ? enHL : ''} <span class="s-cat">${catIcon}</span></div>
    </div>`;
  }).join('');
  dd.classList.add('open');
  searchFiltered = results;
  renderBookGrid(results);
}

function highlight(str, q) {
  const idx = str.toLowerCase().indexOf(q);
  if (idx === -1) return esc(str);
  return esc(str.slice(0,idx)) + '<span class="search-highlight">' + esc(str.slice(idx,idx+q.length)) + '</span>' + esc(str.slice(idx+q.length));
}

function selectSearch(id) {
  const book = bookData.find(b => b.id === id);
  if (!book) return;
  document.getElementById('bookSearch').value = book.ko || book.title;
  closeDropdown();
  searchFiltered = [book];
  renderBookGrid([book]);
}

function closeDropdown() {
  document.getElementById('searchDropdown').classList.remove('open');
}

// ===================== Toast =====================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show';
  setTimeout(() => { t.className = 'toast'; }, 2000);
}

// ===================== Util =====================
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ===================== Init =====================
progress = loadProgress();
buildBookData();
renderBookGrid();
renderBookStats();
</script>
